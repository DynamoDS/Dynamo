name: Validate Agent Skills

on:
  pull_request:
    paths:
      - ".claude/skills/**"
      - ".github/agents/**"

env:
  SKILLS_DIR: .claude/skills

jobs:
  validate_agent_skills:
    name: Validate Agent Skills
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Install skill-validator
        run: go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@v1.5.6
      - name: Validate changed skills
        run: bash .github/scripts/validate_skills.sh "${{ github.base_ref }}" "$SKILLS_DIR"

  validate_agent_skill_wrappers:
    name: Validate Agent Skill Wrappers
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Validate generated wrappers
        shell: pwsh
        run: ./.github/scripts/sync_agent_wrappers.ps1 -Check -Report
